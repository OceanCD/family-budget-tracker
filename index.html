<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Budget Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    h2 { font-size: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card.income { border-top: 4px solid #22c55e; }
    .card.expense { border-top: 4px solid #ef4444; }
    .card.balance { border-top: 4px solid #3b82f6; }
    .card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
    .card .amount { font-size: 24px; font-weight: bold; }
    .card.income .amount { color: #22c55e; }
    .card.expense .amount { color: #ef4444; }
    .card.balance .amount { color: #3b82f6; }
    
    .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    .income-table { width: 100%; border-collapse: collapse; }
    .income-table th { text-align: left; padding: 8px; color: #666; font-weight: normal; border-bottom: 2px solid #eee; }
    .income-table td { padding: 8px; border-bottom: 1px solid #eee; }
    .income-table .calc { color: #888; font-size: 14px; }
    .income-table .total { font-weight: bold; background: #f9f9f9; }
    .income-table input { width: 80px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; }
    
    .expense-list { list-style: none; }
    .expense-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .expense-list .amount { font-weight: bold; }
    .expense-list .editable { cursor: pointer; }
    .expense-list .editable:hover { background: #f5f5f5; }
    
    .other-income { display: flex; gap: 10px; margin-top: 10px; }
    .other-income input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
    
    .btn { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #2563eb; }
    .btn-small { padding: 4px 8px; font-size: 12px; }
    .btn-edit { background: #6b7280; }
    .btn-save { background: #22c55e; }
    .btn-delete { background: #ef4444; margin-left: 10px; }
    
    .edit-row { display: none; }
    .edit-row.active { display: table-row; }
    
    .sync-status { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
    
    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 Family Budget 2026</h1>
    <div class="sync-status" id="syncStatus">Loading...</div>
    
    <div class="summary">
      <div class="card income">
        <h3>💰 Total Income</h3>
        <div class="amount" id="totalIncome">$0</div>
      </div>
      <div class="card expense">
        <h3>💸 Total Expenses</h3>
        <div class="amount" id="totalExpense">$0</div>
      </div>
      <div class="card balance">
        <h3>💎 Balance</h3>
        <div class="amount" id="balance">$0</div>
      </div>
    </div>
    
    <!-- Cruise Income Section -->
    <div class="section">
      <h2>👤 Cruise Income <button class="btn btn-edit" onclick="toggleEdit('cruise')">✏️ Edit</button></h2>
      <table class="income-table" id="cruiseTable">
        <thead>
          <tr><th>Source</th><th>Monthly</th><th>Months</th><th>Total</th><th></th></tr>
        </thead>
        <tbody id="cruiseIncome"></tbody>
      </table>
      <div class="other-income" id="cruiseEdit" style="display:none; margin-top:15px;">
        <input type="text" id="cruiseSource" placeholder="Source name">
        <input type="number" id="cruiseAmount" placeholder="Amount">
        <input type="number" id="cruiseMonths" placeholder="Months" value="12">
        <button class="btn" onclick="addIncome('Cruise')">Add</button>
      </div>
    </div>
    
    <!-- Jessie Income Section -->
    <div class="section">
      <h2>👤 Jessie Income <button class="btn btn-edit" onclick="toggleEdit('jessie')">✏️ Edit</button></h2>
      <table class="income-table" id="jessieTable">
        <thead>
          <tr><th>Source</th><th>Monthly</th><th>Months</th><th>Total</th><th></th></tr>
        </thead>
        <tbody id="jessieIncome"></tbody>
      </table>
      <div class="other-income" id="jessieEdit" style="display:none; margin-top:15px;">
        <input type="text" id="jessieSource" placeholder="Source name">
        <input type="number" id="jessieAmount" placeholder="Amount">
        <input type="number" id="jessieMonths" placeholder="Months" value="12">
        <button class="btn" onclick="addIncome('Jessie')">Add</button>
      </div>
    </div>
    
    <!-- Other Income Section -->
    <div class="section">
      <h2>💵 Other Income</h2>
      <ul class="expense-list" id="otherIncomeList"></ul>
      <div class="other-income">
        <input type="text" id="otherDesc" placeholder="Description">
        <input type="number" id="otherAmount" placeholder="Amount">
        <button class="btn" onclick="addOtherIncome()">Add</button>
      </div>
    </div>
    
    <!-- Housing Expenses -->
    <div class="section">
      <h2>🏠 Housing Expenses <button class="btn btn-edit" onclick="toggleEdit('housing')">✏️ Edit</button></h2>
      <ul class="expense-list" id="housingList"></ul>
      <div class="other-income" id="housingEdit" style="display:none; margin-top:15px;">
        <input type="text" id="housingDesc" placeholder="Description">
        <input type="number" id="housingAmount" placeholder="Amount">
        <input type="number" id="housingMonths" placeholder="Months" value="1">
        <button class="btn" onclick="addExpense('Housing')">Add</button>
      </div>
    </div>
    
    <!-- Living Expenses -->
    <div class="section">
      <h2>📊 Living & Tax Expenses <button class="btn btn-edit" onclick="toggleEdit('living')">✏️ Edit</button></h2>
      <ul class="expense-list" id="livingList"></ul>
      <div class="other-income" id="livingEdit" style="display:none; margin-top:15px;">
        <input type="text" id="livingDesc" placeholder="Description">
        <input type="number" id="livingAmount" placeholder="Amount">
        <input type="number" id="livingMonths" placeholder="Months" value="12">
        <button class="btn" onclick="addExpense('Living')">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Supabase config - using anon key for client-side access
    const SUPABASE_URL = 'https://vkuhcjcpzhgfszrcavhr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrdWhjamNwemhnZnN6cmNhdmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzY4MTcsImV4cCI6MjA4ODgxMjgxN30.wcIjL7nQb8LSgWJM4Yj3P0iBwKestSCjkJI8CvVrYp4';
    
    if (!SUPABASE_KEY) {
      document.getElementById('syncStatus').textContent = '⚠️ Please set SUPABASE_KEY in Vercel environment variables';
    }
    
    let incomeSources = [];
    let otherIncomes = [];
    let expenses = [];
    
    // Fetch all data
    async function loadData() {
      if (!SUPABASE_KEY) return;
      document.getElementById('syncStatus').textContent = 'Syncing...';
      
      try {
        // Load income sources
        let res = await fetch(`${SUPABASE_URL}/rest/v1/income_sources?order=id`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        incomeSources = await res.json();
        
        // Load other income
        res = await fetch(`${SUPABASE_URL}/rest/v1/other_income?order=id`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        otherIncomes = await res.json();
        
        // Load expenses
        res = await fetch(`${SUPABASE_URL}/rest/v1/expenses?order=id`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        expenses = await res.json();
        
        render();
        document.getElementById('syncStatus').textContent = '✅ Synced';
      } catch (e) {
        document.getElementById('syncStatus').textContent = '❌ Error: ' + e.message;
      }
    }
    
    function render() {
      // Render Cruise income
      const cruise = incomeSources.filter(i => i.person === 'Cruise');
      document.getElementById('cruiseIncome').innerHTML = cruise.map(i => `
        <tr>
          <td>${i.source}</td>
          <td>$${i.amount.toLocaleString()}</td>
          <td>× ${i.months}</td>
          <td><strong>$${(i.amount * i.months).toLocaleString()}</strong></td>
          <td><button class="btn btn-small btn-delete" onclick="deleteIncome(${i.id})">✕</button></td>
        </tr>
      `).join('') + `<tr class="total"><td colspan="3">Cruise Total</td><td colspan="2"><strong>$${cruise.reduce((s,i) => s + i.amount * i.months, 0).toLocaleString()}</strong></td></tr>`;
      
      // Render Jessie income
      const jessie = incomeSources.filter(i => i.person === 'Jessie');
      document.getElementById('jessieIncome').innerHTML = jessie.map(i => `
        <tr>
          <td>${i.source}</td>
          <td>$${i.amount.toLocaleString()}</td>
          <td>× ${i.months}</td>
          <td><strong>$${(i.amount * i.months).toLocaleString()}</strong></td>
          <td><button class="btn btn-small btn-delete" onclick="deleteIncome(${i.id})">✕</button></td>
        </tr>
      `).join('') + `<tr class="total"><td colspan="3">Jessie Total</td><td colspan="2"><strong>$${jessie.reduce((s,i) => s + i.amount * i.months, 0).toLocaleString()}</strong></td></tr>`;
      
      // Render other income
      document.getElementById('otherIncomeList').innerHTML = otherIncomes.map(i => `
        <li>
          <span>${i.description}</span>
          <span class="amount">$${i.amount.toLocaleString()} <button class="btn btn-small btn-delete" onclick="deleteOtherIncome(${i.id})">✕</button></span>
        </li>
      `).join('');
      
      // Render housing expenses
      const housing = expenses.filter(e => e.category === 'Housing');
      document.getElementById('housingList').innerHTML = housing.map(e => `
        <li>
          <span>${e.description}${e.months > 1 ? ` ($${e.amount.toLocaleString()} × ${e.months})` : ''}</span>
          <span class="amount">$${(e.amount * e.months).toLocaleString()} <button class="btn btn-small btn-delete" onclick="deleteExpense(${e.id})">✕</button></span>
        </li>
      `).join('') + `<li style="font-weight:bold; border-top:2px solid #eee;"><span>Housing Total</span><span>$${housing.reduce((s,e) => s + e.amount * e.months, 0).toLocaleString()}</span></li>`;
      
      // Render living/tax expenses
      const living = expenses.filter(e => e.category === 'Living' || e.category === 'Tax');
      document.getElementById('livingList').innerHTML = living.map(e => `
        <li>
          <span>${e.description}${e.months > 1 ? ` ($${e.amount.toLocaleString()} × ${e.months})` : ''}</span>
          <span class="amount">$${(e.amount * e.months).toLocaleString()} <button class="btn btn-small btn-delete" onclick="deleteExpense(${e.id})">✕</button></span>
        </li>
      `).join('') + `<li style="font-weight:bold; border-top:2px solid #eee;"><span>Living + Tax Total</span><span>$${living.reduce((s,e) => s + e.amount * e.months, 0).toLocaleString()}</span></li>`;
      
      // Calculate totals
      const totalIncome = 
        cruise.reduce((s,i) => s + i.amount * i.months, 0) +
        jessie.reduce((s,i) => s + i.amount * i.months, 0) +
        otherIncomes.reduce((s,i) => s + i.amount, 0);
      
      const totalExpense = 
        housing.reduce((s,e) => s + e.amount * e.months, 0) +
        living.reduce((s,e) => s + e.amount * e.months, 0);
      
      document.getElementById('totalIncome').textContent = '$' + totalIncome.toLocaleString();
      document.getElementById('totalExpense').textContent = '$' + totalExpense.toLocaleString();
      document.getElementById('balance').textContent = '$' + (totalIncome - totalExpense).toLocaleString();
    }
    
    function toggleEdit(section) {
      const edit = document.getElementById(section + 'Edit');
      edit.style.display = edit.style.display === 'none' ? 'flex' : 'none';
    }
    
    async function addIncome(person) {
      const source = document.getElementById(person.toLowerCase() + 'Source').value;
      const amount = parseInt(document.getElementById(person.toLowerCase() + 'Amount').value);
      const months = parseInt(document.getElementById(person.toLowerCase() + 'Months').value) || 1;
      
      if (!source || !amount) return alert('Please fill all fields');
      
      await fetch(`${SUPABASE_URL}/rest/v1/income_sources`, {
        method: 'POST',
        headers: { 
          'apikey': SUPABASE_KEY, 
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ person, source, amount, months })
      });
      
      document.getElementById(person.toLowerCase() + 'Source').value = '';
      document.getElementById(person.toLowerCase() + 'Amount').value = '';
      loadData();
    }
    
    async function deleteIncome(id) {
      if (!confirm('Delete this income?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/income_sources?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      loadData();
    }
    
    async function addOtherIncome() {
      const desc = document.getElementById('otherDesc').value;
      const amount = parseInt(document.getElementById('otherAmount').value);
      if (!desc || !amount) return alert('Please fill all fields');
      
      await fetch(`${SUPABASE_URL}/rest/v1/other_income`, {
        method: 'POST',
        headers: { 
          'apikey': SUPABASE_KEY, 
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ description: desc, amount })
      });
      
      document.getElementById('otherDesc').value = '';
      document.getElementById('otherAmount').value = '';
      loadData();
    }
    
    async function deleteOtherIncome(id) {
      if (!confirm('Delete this income?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/other_income?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      loadData();
    }
    
    async function addExpense(category) {
      const desc = document.getElementById(category.toLowerCase() + 'Desc').value;
      const amount = parseInt(document.getElementById(category.toLowerCase() + 'Amount').value);
      const months = parseInt(document.getElementById(category.toLowerCase() + 'Months').value) || 1;
      
      if (!desc || !amount) return alert('Please fill all fields');
      
      await fetch(`${SUPABASE_URL}/rest/v1/expenses`, {
        method: 'POST',
        headers: { 
          'apikey': SUPABASE_KEY, 
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ category, description: desc, amount, months, is_recurring: months > 1 })
      });
      
      document.getElementById(category.toLowerCase() + 'Desc').value = '';
      document.getElementById(category.toLowerCase() + 'Amount').value = '';
      loadData();
    }
    
    async function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      loadData();
    }
    
    // Load data on page load
    loadData();
  </script>
</body>
</html>
